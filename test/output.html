<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test intro scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>:root {
  --primary: #2D1B69;
  --secondary: #6B4C9A;
  --accent: #9B6DFF;
  --bg: #FFFFFF;
  --surface: #F8F6FF;
  --text: #1A1A2E;
  --text-muted: #6B7280;
  --success: #10B981;
  --error: #EF4444;
  --warning: #F59E0B;
  --radius: 12px;
  --font-heading: ''Inter', sans-serif', system-ui, sans-serif;
  --font-body: ''Inter', sans-serif', system-ui, sans-serif;
  --spacing: 24px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --content-width: 760px;
  --wide-width: 1080px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

#root { width: 100%; min-height: 100vh; }
img[alt]::after { content: attr(alt); display: block; padding: var(--spacing); text-align: center; color: var(--text-muted); font-size: 13px; }
img { max-width: 100%; }

h1, h2, h3 {
  font-family: var(--font-heading);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
h1 { font-size: 31px; margin-bottom: calc(var(--spacing) * 2); }
h2 { font-size: 25px; margin-bottom: calc(var(--spacing) * 1.5); }
h3 { font-size: 19px; margin-bottom: var(--spacing); }
p { margin-bottom: var(--spacing); max-width: 680px; }

.course-scroll {
  width: 100%;
}

.section {
  position: relative;
  padding: calc(var(--spacing) * 4) calc(var(--spacing) * 2);
}
.section-inner {
  max-width: var(--content-width);
  margin: 0 auto;
}

.section:nth-child(even):not(.section-hero):not(.section-results) {
  background: var(--surface);
}

.section-divider {
  width: 60px; height: 3px;
  background: var(--primary);
  margin: 0 auto calc(var(--spacing) * 3);
  border-radius: 2px;
}

.progress-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 4px; background: #2D1B6922;
  z-index: 1000;
}
.progress-fill {
  height: 100%; background: var(--primary);
  transition: width 0.15s ease;
}

.section-hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #2D1B69 0%, #6B4C9A 100%);
  color: white; text-align: center;
  padding: 0; position: relative; overflow: hidden;
}
.section-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.1) 0%, transparent 60%);
}
.section-hero .section-inner { position: relative; z-index: 2; max-width: 720px; padding: calc(var(--spacing) * 2); }
.section-hero h1 { font-size: 41px; color: white; }
.section-hero .subtitle { font-size: 18px; opacity: 0.85; margin-bottom: calc(var(--spacing) * 3); }
.section-hero .logo { max-width: 160px; max-height: 50px; margin-bottom: calc(var(--spacing) * 2); }
.section-hero .btn { background: white; color: var(--primary); font-weight: 700; }
.section-hero .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

.hero-bg {
  background-size: cover; background-position: center;
}
.hero-bg::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.7));
}

.scroll-indicator {
  position: absolute; bottom: calc(var(--spacing) * 3);
  left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.6); font-size: 13px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

.content-block {
  margin-bottom: calc(var(--spacing) * 3);
}
.content-block:last-child { margin-bottom: 0; }

.narrative-text {
  max-width: 680px;
}
.narrative-text p {
  font-size: 17px;
  line-height: 1.8;
  color: var(--text);
}

.callout {
  padding: calc(var(--spacing) * 2);
  border-left: 4px solid var(--primary);
  background: #2D1B6908;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: calc(var(--spacing) * 2) 0;
  font-style: italic;
  color: var(--text-muted);
}

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: calc(var(--spacing) * 1.5) calc(var(--spacing) * 3);
  border: none; border-radius: var(--radius);
  font-family: var(--font-body); font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  text-decoration: none; min-width: 120px;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, #2D1B69 0%, #6B4C9A 100%);
  color: white; border: none;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 15px #2D1B6944; }

.btn-secondary {
  background: transparent; color: var(--primary);
  border: 2px solid var(--primary);
}
.btn-secondary:hover { background: var(--primary); color: white; }

.btn-ghost {
  background: transparent; color: var(--text-muted);
  border: 1px solid rgba(0,0,0,0.08);
}
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

.actions { margin-top: calc(var(--spacing) * 2); text-align: center; }

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: calc(var(--spacing) * 2);
  width: 100%; max-width: var(--content-width);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  transition: all var(--transition);
}

.hero-image {
  width: 100%; border-radius: var(--radius);
  overflow: hidden; margin-bottom: calc(var(--spacing) * 2);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.hero-image img { width: 100%; height: auto; display: block; }

.media-feature {
  width: 100%; max-width: var(--wide-width);
  margin: 0 auto;
}

.video-container {
  width: 100%; border-radius: var(--radius);
  overflow: hidden; margin-bottom: calc(var(--spacing) * 2);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.video-container video { width: 100%; height: auto; display: block; background: #000; }

.audio-container {
  width: 100%;
  margin-bottom: calc(var(--spacing) * 2);
}
.audio-container audio { width: 100%; border-radius: var(--radius); }

.form-group { margin-bottom: calc(var(--spacing) * 2); width: 100%; }
.form-group label {
  display: block; font-weight: 600; margin-bottom: calc(var(--spacing) * 0.5);
  color: var(--text);
}
.form-group input, .form-group textarea {
  width: 100%; padding: calc(var(--spacing) * 1.5);
  border: 2px solid rgba(0,0,0,0.08); border-radius: var(--radius);
  font-family: var(--font-body); font-size: 16px;
  transition: border-color var(--transition);
  background: var(--bg); color: var(--text);
}
.form-group input:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px #2D1B6922;
}

.accordion {
  width: 100%; max-width: var(--content-width);
}
.accordion-item {
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: var(--radius);
  margin-bottom: var(--spacing);
  overflow: hidden;
  transition: all var(--transition);
}
.accordion-item.open {
  border-color: var(--primary);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.accordion-trigger {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: calc(var(--spacing) * 1.5) calc(var(--spacing) * 2);
  background: var(--surface); border: none; cursor: pointer;
  font-family: var(--font-heading); font-size: 17px;
  font-weight: 600; color: var(--text); text-align: left;
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.accordion-trigger:hover { color: var(--primary); }
.accordion-item.open .accordion-trigger { color: var(--primary); }
.accordion-icon {
  font-size: 20px; font-weight: 300;
  transition: transform var(--transition);
  flex-shrink: 0; margin-left: var(--spacing);
}
.accordion-panel {
  padding: calc(var(--spacing) * 2);
  background: var(--bg);
  border-top: 1px solid rgba(0,0,0,0.06);
  animation: accordionOpen 0.3s ease-out;
}
@keyframes accordionOpen {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-triggers {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--spacing);
  width: 100%; max-width: var(--content-width);
}
.modal-trigger-tile {
  display: flex; align-items: center;
  border: 1px solid rgba(0,0,0,0.08); border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  background: var(--surface); transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.modal-trigger-tile:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.tile-thumb {
  width: 80px; height: 80px; flex-shrink: 0; overflow: hidden;
}
.tile-thumb img { width: 100%; height: 100%; object-fit: cover; }
.tile-label {
  flex: 1; display: flex; justify-content: space-between; align-items: center;
  padding: var(--spacing) calc(var(--spacing) * 1.5);
  font-weight: 600; font-size: 15px;
}
.tile-arrow { color: var(--primary); font-size: 18px; }

.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  padding: calc(var(--spacing) * 2);
  animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
  background: var(--surface); border-radius: var(--radius);
  width: 100%; max-width: 600px; max-height: 85vh;
  overflow-y: auto; padding: calc(var(--spacing) * 2);
  position: relative;
  animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-close {
  position: sticky; top: 0; float: right;
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: rgba(0,0,0,0.05);
  cursor: pointer; font-size: 18px; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); z-index: 1;
}
.modal-close:hover { background: var(--primary); color: white; }
.modal-image {
  width: 100%; border-radius: var(--radius);
  overflow: hidden; margin-bottom: calc(var(--spacing) * 2);
}
.modal-image img { width: 100%; height: auto; display: block; }

.bento-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--spacing);
  width: 100%; max-width: var(--content-width);
}
.bento-tile {
  background: var(--surface);
  border-radius: var(--radius);
  padding: calc(var(--spacing) * 2);
  border: 1px solid rgba(0,0,0,0.08);
  transition: all var(--transition);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.bento-tile:hover { border-color: var(--primary); transform: translateY(-2px); }
.bento-tile h3 { color: var(--primary); }
.bento-image {
  width: 100%; border-radius: calc(var(--radius) * 0.6);
  overflow: hidden; margin-bottom: var(--spacing);
}
.bento-image img { width: 100%; height: auto; display: block; }

.branch-container { text-align: center; width: 100%; max-width: var(--content-width); margin: 0 auto; }
.greeting { font-size: 18px; margin-bottom: calc(var(--spacing) * 2); }
.branch-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: calc(var(--spacing) * 1.5);
  margin-top: calc(var(--spacing) * 2);
}
.branch-option {
  padding: calc(var(--spacing) * 2.5) calc(var(--spacing) * 3);
  border: 2px solid rgba(0,0,0,0.08); border-radius: var(--radius);
  cursor: pointer; transition: all var(--transition);
  text-align: center;
  background: var(--surface);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  -webkit-tap-highlight-color: transparent;
}
.branch-option:hover {
  border-color: var(--primary); transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}
.branch-option h3 { color: var(--primary); margin-bottom: 0; }

.quiz-section {
  min-height: 80vh;
  display: flex; align-items: center; justify-content: center;
  padding: calc(var(--spacing) * 4) calc(var(--spacing) * 2);
}
.quiz-container { text-align: center; width: 100%; max-width: var(--content-width); }
.quiz-counter { color: var(--text-muted); margin-bottom: var(--spacing); }
.quiz-question {
  font-family: var(--font-heading); font-size: 19px;
  font-weight: 700; margin-bottom: calc(var(--spacing) * 2);
  text-align: center; max-width: 680px; margin-left: auto; margin-right: auto;
}
.quiz-choices { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: var(--spacing); margin: 0 auto; }
.quiz-choice {
  display: flex; align-items: center; gap: calc(var(--spacing) * 1.5);
  padding: calc(var(--spacing) * 1.5) calc(var(--spacing) * 2);
  border: 2px solid rgba(0,0,0,0.08); border-radius: var(--radius);
  cursor: pointer; transition: all var(--transition);
  background: var(--surface); font-size: 16px;
  text-align: left; -webkit-tap-highlight-color: transparent;
}
.quiz-choice:hover { border-color: var(--primary); }
.quiz-choice.selected { border-color: var(--primary); background: #2D1B6911; }
.quiz-choice.correct { border-color: var(--success); background: #10B98111; }
.quiz-choice.incorrect { border-color: var(--error); background: #EF444411; }
.quiz-choice .indicator {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.08); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: white;
  transition: all var(--transition);
}
.quiz-choice.selected .indicator { border-color: var(--primary); background: var(--primary); }
.quiz-choice.correct .indicator { border-color: var(--success); background: var(--success); }
.quiz-choice.incorrect .indicator { border-color: var(--error); background: var(--error); }
.quiz-choice .indicator.checkbox { border-radius: 4px; }
.quiz-choice.selected .indicator.checkbox { border-color: var(--primary); background: var(--primary); }
.quiz-feedback {
  margin-top: calc(var(--spacing) * 2); padding: calc(var(--spacing) * 1.5);
  border-radius: var(--radius); text-align: center; font-weight: 600;
}
.quiz-feedback.correct { background: #10B98115; color: var(--success); }
.quiz-feedback.incorrect { background: #EF444415; color: var(--error); }

.quiz-text-entry { width: 100%; max-width: 560px; margin: var(--spacing) auto; }
.quiz-text-entry input, .quiz-text-entry textarea {
  width: 100%; padding: calc(var(--spacing) * 1.5);
  border: 2px solid rgba(0,0,0,0.08); border-radius: var(--radius);
  font-family: var(--font-body); font-size: 16px;
  background: var(--bg); color: var(--text);
  transition: border-color var(--transition);
}
.quiz-text-entry input:focus, .quiz-text-entry textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px #2D1B6922;
}

.section-results {
  min-height: 80vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #2D1B69 0%, #6B4C9A 100%);
  color: white; text-align: center;
}
.section-results .section-inner { max-width: 500px; }
.score-circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 6px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  margin: calc(var(--spacing) * 2) auto;
  animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.score-circle .score-value { font-size: 36px; font-weight: 700; font-family: var(--font-heading); }
.score-circle .score-label { font-size: 13px; opacity: 0.8; }
.results-msg { color: rgba(255,255,255,0.85); margin-top: calc(var(--spacing) * 2); }
.btn-restart { margin-top: calc(var(--spacing) * 2); background: white; color: var(--primary); border: none; font-weight: 700; }

@keyframes scaleIn {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.scroll-reveal {
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.scroll-reveal.visible {
  animation: revealIn 0.6s ease both;
}
@keyframes revealIn {
  from { opacity: 0.3; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.toc {
  position: fixed; right: calc(var(--spacing) * 2); top: 50%;
  transform: translateY(-50%); z-index: 500;
  display: none;
}
.toc-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(0,0,0,0.08); margin-bottom: 8px;
  cursor: pointer; transition: all var(--transition);
}
.toc-dot.active { background: var(--primary); transform: scale(1.4); }
.toc-dot:hover { background: var(--primary); }

@media (min-width: 768px) {
  .section { padding: calc(var(--spacing) * 8) calc(var(--spacing) * 4); }
  h1 { font-size: 48px; }
  h2 { font-size: 36px; }
  h3 { font-size: 24px; }
  .section-hero h1 { font-size: 62px; }
  .section-hero .logo { max-width: 200px; max-height: 60px; }
  .card { padding: calc(var(--spacing) * 3); }
  .btn { padding: calc(var(--spacing) * 1.5) calc(var(--spacing) * 4); min-width: 140px; }
  .score-circle { width: 160px; height: 160px; }
  .score-circle .score-value { font-size: 48px; }
  .quiz-question { font-size: 24px; }
  .bento-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .branch-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
  .modal-triggers { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .tile-thumb { width: 100px; height: 100px; }
  .modal-content { padding: calc(var(--spacing) * 3); }
  .toc { display: flex; flex-direction: column; align-items: center; }
}

@media (min-width: 1200px) {
  .section-inner { max-width: var(--wide-width); }
  .narrative-text { max-width: 760px; }
}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script>var SCORM = (function() {
  var api = null, initialized = false, completed = false;
  function findAPI(win) {
    var attempts = 0;
    while (win && !win.API && attempts < 10) {
      if (win.parent && win.parent !== win) { win = win.parent; }
      else if (win.opener) { win = win.opener; }
      else { break; }
      attempts++;
    }
    return win ? win.API : null;
  }
  function init() {
    api = findAPI(window);
    if (!api) { console.warn("[SCORM] No LMS API found — standalone mode"); return false; }
    var result = api.LMSInitialize("");
    initialized = (result === "true" || result === true);
    if (initialized) { api.LMSSetValue("cmi.core.lesson_status", "incomplete"); api.LMSCommit(""); }
    return initialized;
  }
  function setValue(key, value) {
    if (!api || !initialized) return false;
    api.LMSSetValue(key, String(value)); api.LMSCommit(""); return true;
  }
  function setScore(score, max, min) {
    setValue("cmi.core.score.raw", score);
    setValue("cmi.core.score.max", max || 100);
    setValue("cmi.core.score.min", min || 0);
  }
  function complete(score, passingScore) {
    if (completed) return; completed = true;
    if (typeof score === "number") {
      setScore(score);
      setValue("cmi.core.lesson_status", score >= (passingScore || 80) ? PASS_STATUS : FAIL_STATUS);
    } else { setValue("cmi.core.lesson_status", "completed"); }
  }
  function finish() { if (api && initialized) api.LMSFinish(""); }
  return { init: init, setValue: setValue, setScore: setScore, complete: complete, finish: finish };
})();
window.addEventListener("load", function() { SCORM.init(); });
window.addEventListener("beforeunload", function() { SCORM.finish(); });
</script>

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function useScrollReveal() {
  var ref = React.useRef(null);
  React.useEffect(function() {
    var el = ref.current;
    if (!el) return;
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05 });
    observer.observe(el);
    return function() { observer.disconnect(); };
  }, []);
  return ref;
}

      e("h1", null, slide.title || COURSE_TITLE),
      slide.subtitle ? e("p", { className: "subtitle" }, slide.subtitle) : null,
      slide.texts && slide.texts.length > 0 && slide.texts[0] !== slide.title ? e("p", { className: "subtitle" }, slide.texts[0]) : null,
      e("div", { className: "scroll-indicator" }, e("span", null, "Scroll to begin"), e("span", null, "\u2193"))
    );
  }

  function renderNarrativeSlide(slide, key) {
    return e(RevealBlock, { key: key, className: "content-block" },
      slide.title && slide.type !== "title" ? e("h2", null, slide.title) : null,
      slide.headings ? slide.headings.map(function(h, i) { return e("h3", { key: "h" + i }, h); }) : null,
      slide.callouts ? slide.callouts.map(function(c, i) { return e("div", { key: "c" + i, className: "callout" }, c); }) : null,
      slide.texts ? e("div", { className: "narrative-text" },
        slide.texts.map(function(t, i) { return e("p", { key: "t" + i }, t); })
      ) : null,
      slide.image ? e("div", { className: "hero-image" }, e("img", { src: slide.image, alt: slide.title || "" })) : null,
      slide.video ? e("div", { className: "video-container" }, e("video", { controls: true, preload: "metadata", poster: slide.video.poster, src: slide.video.src })) : null,
      slide.audio ? e("div", { className: "audio-container" }, e("audio", { controls: true, preload: "metadata", src: slide.audio.src })) : null,
      renderLayers(slide)
    );
  }

  function renderMediaSlide(slide, key) {
    return e(RevealBlock, { key: key, className: "content-block media-feature" },
      slide.title ? e("h2", null, slide.title) : null,
      slide.video ? e("div", { className: "video-container" }, e("video", { controls: true, preload: "metadata", poster: slide.video.poster, src: slide.video.src })) : null,
      !slide.video && slide.image ? e("div", { className: "hero-image" }, e("img", { src: slide.image, alt: slide.title || "" })) : null,
      slide.texts ? e("div", { className: "narrative-text" },
        slide.texts.map(function(t, i) { return e("p", { key: "t" + i }, t); })
      ) : null,
      slide.audio ? e("div", { className: "audio-container" }, e("audio", { controls: true, preload: "metadata", src: slide.audio.src })) : null
    );
  }

  function renderInteractiveSlide(slide, key) {
    return e(RevealBlock, { key: key, className: "content-block" },
      slide.title ? e("h2", null, slide.title) : null,
      slide.texts ? e("div", { className: "narrative-text" },
        slide.texts.map(function(t, i) { return e("p", { key: "t" + i }, t); })
      ) : null,
      slide.image ? e("div", { className: "hero-image" }, e("img", { src: slide.image, alt: slide.title || "" })) : null,
      slide.audio ? e("div", { className: "audio-container" }, e("audio", { controls: true, preload: "metadata", src: slide.audio.src })) : null,
      renderLayers(slide)
    );
  }

  function renderLayers(slide) {
    if (!slide.layers || slide.layers.length === 0) return null;
    var type = slide.interactionType || "accordion";
    if (type === "bento") return renderBentoGrid(slide);
    if (type === "modal") return renderModalTriggers(slide);
    return renderAccordion(slide);
  }

  function renderAccordion(slide) {
    return e("div", { className: "accordion" },
      slide.layers.map(function(layer, i) {
        var isOpen = isPanelOpen(slide.id, i);
        return e("div", { className: "accordion-item" + (isOpen ? " open" : ""), key: i },
          e("button", { className: "accordion-trigger", onClick: function() { togglePanel(slide.id, i); } },
            e("span", null, layer.name),
            e("span", { className: "accordion-icon" }, isOpen ? "\u2212" : "\u002B")
          ),
          isOpen ? e("div", { className: "accordion-panel" },
            layer.image ? e("div", { className: "hero-image" }, e("img", { src: layer.image, alt: layer.name })) : null,
            layer.texts && layer.texts.map(function(t, j) { return e("p", { key: j }, t); }),
            layer.audio && layer.audio.length > 0 ? e("div", { className: "audio-container" },
              e("audio", { controls: true, preload: "metadata", src: layer.audio[0].src })) : null
          ) : null
        );
      })
    );
  }

  function renderModalTriggers(slide) {
    return e("div", { className: "modal-triggers" },
      slide.layers.map(function(layer, i) {
        return e("div", { className: "modal-trigger-tile", key: i,
          onClick: function() { setModalLayer({ slide: slide, index: i }); }
        },
          layer.image ? e("div", { className: "tile-thumb" },
            e("img", { src: layer.image, alt: layer.name })) : null,
          e("div", { className: "tile-label" },
            e("span", null, layer.name),
            e("span", { className: "tile-arrow" }, "\u2192")
          )
        );
      })
    );
  }

  function renderModalOverlay() {
    var layer = modalLayer && modalLayer.slide && modalLayer.slide.layers ? modalLayer.slide.layers[modalLayer.index] : null;
    if (!layer) return null;
    return e("div", { className: "modal-overlay", onClick: function() { setModalLayer(null); } },
      e("div", { className: "modal-content", onClick: function(ev) { ev.stopPropagation(); } },
        e("button", { className: "modal-close", onClick: function() { setModalLayer(null); } }, "\u2715"),
        e("h3", null, layer.name),
        layer.image ? e("div", { className: "modal-image" },
          e("img", { src: layer.image, alt: layer.name })) : null,
        layer.texts && layer.texts.map(function(t, i) { return e("p", { key: i }, t); }),
        layer.audio && layer.audio.length > 0 ? e("div", { className: "audio-container" },
          e("audio", { controls: true, preload: "metadata", src: layer.audio[0].src })) : null
      )
    );
  }

  function renderBentoGrid(slide) {
    return e("div", { className: "bento-grid" },
      slide.layers.map(function(layer, i) {
        var showName = layer.name && layer.texts && layer.texts.length > 0
          ? !layer.texts.some(function(t) { return layer.name.indexOf(t.substring(0, 30)) === 0 || t.indexOf(layer.name.replace("...", "")) === 0; })
          : !!layer.name;
        return e("div", { className: "bento-tile", key: i },
          layer.image ? e("div", { className: "bento-image" },
            e("img", { src: layer.image, alt: layer.name })) : null,
          showName ? e("h3", null, layer.name) : null,
          layer.texts && layer.texts.map(function(t, j) { return e("p", { key: j }, t); })
        );
      })
    );
  }

  function renderFormSlide(slide, key) {
    return e(RevealBlock, { key: key, className: "content-block" },
      e("div", { className: "card" },
        e("h2", null, slide.title),
        slide.instruction ? e("p", null, slide.instruction) : null,
        slide.fields && slide.fields.map(function(f, i) {
          return e("div", { className: "form-group", key: i },
            e("label", null, f.label || f.placeholder),
            e("input", { type: f.fieldType || "text", placeholder: f.placeholder,
              defaultValue: "",
              onChange: function(ev) { handleFormChange(f.variableName, ev.target.value); }
            })
          );
        })
      )
    );
  }

  function renderBranchingSlide(slide, key) {
    // Find user name from any form field that looks like a name field
    var userName = "";
    Object.keys(formData).forEach(function(k) {
      if (!userName && formData[k] && /name/i.test(k)) userName = formData[k];
    });
    if (!userName) { var firstVal = Object.values(formData).find(function(v) { return v; }); userName = firstVal || ""; }
    return e(RevealBlock, { key: key, className: "content-block" },
      e("div", { className: "branch-container" },
        e("h2", null, slide.title),
        slide.greeting ? e("p", { className: "greeting" },
          slide.greeting.replace("%name%", userName)) : null,
        slide.headings ? slide.headings.map(function(h, i) { return e("p", { key: "bh" + i, style: { fontWeight: 600 } }, h); }) : null,
        slide.texts ? slide.texts.map(function(t, i) { return e("p", { key: "bt" + i, style: { maxWidth: "680px", margin: "0 auto", marginBottom: "var(--spacing)" } }, t); }) : null,
        e("div", { className: "branch-grid" },
          slide.options && slide.options.map(function(opt, i) {
            return e("div", { className: "branch-option", key: i,
              onClick: function() {
                setBranch(opt.value || opt.label);
                if (opt.quizBank) { startQuiz(opt.quizBank); }
                else { setScore(100); setQuizState("complete"); SCORM.complete(100, MASTERY); }
              }
            },
            e("h3", null, opt.label),
            opt.description ? e("p", { style: { fontSize: "14px", color: "var(--text-muted)", marginTop: "calc(var(--spacing) * 0.5)", marginBottom: 0 } }, opt.description) : null
          );
          })
        )
      )
    );
  }

  function renderInlineQuiz(slide, key) {
    if (!slide.quiz) return renderNarrativeSlide(slide, key);
    return e(RevealBlock, { key: key, className: "content-block" },
      e("div", { className: "card", style: { textAlign: "center" } },
        e("h2", null, slide.title || "Knowledge Check"),
        e("p", null, "A quiz awaits — test your understanding."),
        e("div", { className: "actions" },
          e("button", { className: "btn btn-primary", onClick: function() {
            var qs = [slide.quiz]; setQuizQuestions(qs); setQuizIndex(0); setCorrectCount(0); setTotalQ(1);
            setQuizState("active"); setSelectedChoice(null); setAnswered(false);
          } }, "Start Quiz")
        )
      )
    );
  }

  function renderQuizSlide() {
    var q = quizQuestions[quizIndex];
    if (!q) return e("div", null, "Loading quiz...");
    var qType = q.questionType || "pick-one";
    var isMulti = qType === "pick-many";
    var isTextEntry = qType === "text-entry";
    var wasCorrect = false;
    if (answered && !isTextEntry) {
      if (isMulti) {
        wasCorrect = q.choices.every(function(c, i) { var isSel = selectedChoices.indexOf(i) >= 0; return c.isCorrect ? isSel : !isSel; });
      } else { wasCorrect = q.choices[selectedChoice] && q.choices[selectedChoice].isCorrect; }
    }
    return e("div", { className: "quiz-container" },
      e("p", { className: "quiz-counter" }, "Question " + (quizIndex + 1) + " of " + totalQ),
      e("div", { className: "quiz-question" }, q.questionText),
      isTextEntry ? e("div", { className: "quiz-text-entry" },
        e("input", { type: "text", placeholder: "Type your answer...", value: textAnswer, disabled: answered,
          onChange: function(ev) { setTextAnswer(ev.target.value); },
          onKeyDown: function(ev) { if (ev.key === "Enter" && textAnswer.trim()) submitTextAnswer(); }
        }),
        !answered && textAnswer.trim() ? e("div", { className: "actions" },
          e("button", { className: "btn btn-primary", onClick: submitTextAnswer }, "Submit Answer")) : null
      ) :
      e("div", { className: "quiz-choices" },
        q.choices.map(function(c, i) {
          var cls = "quiz-choice";
          var isSel = isMulti ? selectedChoices.indexOf(i) >= 0 : selectedChoice === i;
          if (isSel) cls += " selected";
          if (answered && c.isCorrect) cls += " correct";
          if (answered && isSel && !c.isCorrect) cls += " incorrect";
          return e("div", { className: cls, key: i, onClick: function() { handleQuizAnswer(i); } },
            e("div", { className: "indicator" + (isMulti ? " checkbox" : "") },
              answered ? (c.isCorrect ? "\u2713" : (isSel ? "\u2717" : "")) : (isSel ? (isMulti ? "\u2713" : "\u25CF") : "")
            ),
            e("span", null, c.text)
          );
        })
      ),
      isMulti && !answered && selectedChoices.length > 0 ? e("div", { className: "actions" },
        e("button", { className: "btn btn-primary", onClick: submitMultiAnswer }, "Submit Answer")) : null,
      answered ? e("div", { className: "quiz-feedback " + (isTextEntry ? "correct" : (wasCorrect ? "correct" : "incorrect")) },
        isTextEntry ? "Answer submitted" : (wasCorrect ? (q.correctFeedback || "Correct!") : (q.incorrectFeedback || "Incorrect."))) : null,
      answered ? e("div", { className: "actions" },
        e("button", { className: "btn btn-primary", onClick: nextQuestion },
          quizIndex < quizQuestions.length - 1 ? "Next Question" : "See Results")) : null
    );
  }

  function renderResultsSlide(slide, key) {
    var displayScore = score !== null ? score : 0;
    var passed = displayScore >= MASTERY;
    return e("div", { key: key },
      e("h2", null, slide.title || "Your Results"),
      e("div", { className: "score-circle" },
        e("div", { className: "score-value" }, displayScore + "%"),
        e("div", { className: "score-label" }, passed ? "Passed" : "Not passed")
      ),
      e("p", { className: "results-msg" },
        passed ? "Congratulations! You have successfully completed this course."
          : "You need " + MASTERY + "% to pass. Please try again."),
      !passed ? e("button", {
        className: "btn btn-restart",
        onClick: function() { window.scrollTo({ top: 0, behavior: "smooth" }); setQuizState(null); setScore(null); }
      }, "Restart Course") : null
    );
  }

  return e("div", null,
    e("div", { className: "progress-bar" }, e("div", { className: "progress-fill", style: { width: "0%" } })),
    e("div", { className: "course-scroll" },
      SECTIONS.map(function(section, si) {
        return renderSection(section, si);
      })
    ),
    quizState === "active" && quizQuestions.length > 0 ? e("div", { className: "quiz-section", style: {
      position: "fixed", inset: 0, zIndex: 900, background: "var(--bg)", overflowY: "auto"
    } }, renderQuizSlide()) : null,
    modalLayer !== null ? renderModalOverlay() : null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
