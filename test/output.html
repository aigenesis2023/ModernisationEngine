  }

  function renderAccordion(slide) {
    return e("div", { className: "accordion" },
      slide.layers.map(function(layer, i) {
        var isOpen = isPanelOpen(slide.id, i);
        var triggerLabel = getAccordionLabel(layer);
        return e("div", { className: "accordion-item" + (isOpen ? " open" : ""), key: i },
          e("button", { className: "accordion-trigger", onClick: function() { togglePanel(slide.id, i); } },
            e("span", null, triggerLabel),
            e("span", { className: "accordion-icon" }, "\u203A")
          ),
          e("div", { className: "accordion-panel" },
            e("div", { className: "accordion-panel-inner" },
              layer.image ? e("div", { className: "hero-image" }, e("img", { src: layer.image, alt: layer.name })) : null,
              layer.texts && layer.texts.map(function(t, j) { return e("p", { key: j }, t); }),
              layer.audio && layer.audio.length > 0 ? e("div", { className: "audio-container" },
                e("audio", { controls: true, preload: "metadata", src: layer.audio[0].src })) : null
            )
          )
        );
      })
    );
  }

  function renderModalTriggers(slide) {
    return e("div", { className: "modal-triggers" },
      slide.layers.map(function(layer, i) {
        return e("div", { className: "modal-trigger-tile", key: i,
          onClick: function() { setModalLayer({ slide: slide, index: i }); }
        },
          layer.image ? e("div", { className: "tile-thumb" },
            e("img", { src: layer.image, alt: layer.name })) : null,
          e("div", { className: "tile-label" },
            e("span", null, layer.name),
            e("span", { className: "tile-arrow" }, "\u2192")
          )
        );
      })
    );
  }

  function renderModalOverlay() {
    var layer = modalLayer && modalLayer.slide && modalLayer.slide.layers ? modalLayer.slide.layers[modalLayer.index] : null;
    if (!layer) return null;
    return e("div", { className: "modal-overlay", onClick: function() { setModalLayer(null); } },
      e("div", { className: "modal-content", onClick: function(ev) { ev.stopPropagation(); } },
        e("button", { className: "modal-close", onClick: function() { setModalLayer(null); } }, "\u2715"),
        e("h3", null, layer.name),
        layer.image ? e("div", { className: "modal-image" },
          e("img", { src: layer.image, alt: layer.name })) : null,
        layer.texts && layer.texts.map(function(t, i) { return e("p", { key: i }, t); }),
        layer.audio && layer.audio.length > 0 ? e("div", { className: "audio-container" },
          e("audio", { controls: true, preload: "metadata", src: layer.audio[0].src })) : null
      )
    );
  }

  function renderBentoGrid(slide) {
    return e("div", { className: "bento-grid" },
      slide.layers.map(function(layer, i) {
        var showName = layer.name && layer.texts && layer.texts.length > 0
          ? !layer.texts.some(function(t) { return layer.name.indexOf(t.substring(0, 30)) === 0 || t.indexOf(layer.name.replace("...", "")) === 0; })
          : !!layer.name;
        return e("div", { className: "bento-tile", key: i },
          layer.image ? e("div", { className: "bento-image" },
            e("img", { src: layer.image, alt: layer.name })) : null,
          showName ? e("h3", null, layer.name) : null,
          layer.texts && layer.texts.map(function(t, j) { return e("p", { key: j }, t); })
        );
      })
    );
  }

  function renderFormSlide(slide, key, sectionIdx, section) {
    var showTitle = slide.title && (!section || slide.title !== section.title);
    return e(RevealBlock, { key: key, className: "content-block" },
      e("div", { className: "card" },
        showTitle ? e("h2", null, slide.title) : null,
        slide.instruction ? e("p", { style: { color: "var(--text-muted)" } }, slide.instruction) : null,
        slide.fields && slide.fields.map(function(f, i) {
          return e("div", { className: "form-group", key: i },
            e("label", null, f.label || f.placeholder),
            e("input", { type: f.fieldType || "text", placeholder: f.placeholder,
              defaultValue: "",
              onChange: function(ev) { handleFormChange(f.variableName, ev.target.value); }
            })
          );
        }),
        e("div", { className: "actions" },
          e("button", { className: "btn btn-primary", onClick: function() {} }, "Continue")
        )
      )
    );
  }

  function renderBranchingSlide(slide, key, sectionIdx, section) {
    var userName = "";
    Object.keys(formData).forEach(function(k) {
      if (!userName && formData[k] && /name/i.test(k)) userName = formData[k];
    });
    if (!userName) { var firstVal = Object.values(formData).find(function(v) { return v; }); userName = firstVal || ""; }
    var showTitle = slide.title && (!section || slide.title !== section.title) && !isAutoTitle(slide.title);
    return e(RevealBlock, { key: key, className: "content-block" },
      e("div", { className: "branch-container" },
        showTitle ? e("h2", null, slide.title) : null,
        slide.greeting ? e("p", { className: "greeting" },
          slide.greeting.replace("%name%", userName)) : null,
        slide.headings ? slide.headings.map(function(h, i) { return e("p", { key: "bh" + i, style: { fontWeight: 600 } }, h); }) : null,
        slide.texts ? slide.texts.map(function(t, i) { return e("p", { key: "bt" + i, style: { maxWidth: "680px", margin: "0 auto 1rem" } }, t); }) : null,
        e("div", { className: "branch-grid" },
          slide.options && slide.options.map(function(opt, i) {
            var isSelected = branch === (opt.value || opt.label);
            return e("div", {
              className: "branch-option" + (isSelected ? " selected" : ""),
              key: i,
              onClick: function() {
                setBranch(opt.value || opt.label);
                if (opt.quizBank) { startQuiz(opt.quizBank); }
                else { setScore(100); setQuizState("complete"); SCORM.complete(100, MASTERY); }
              }
            },
            e("h3", null, opt.label),
            opt.description ? e("p", { style: { fontSize: "0.9rem", color: "var(--text-muted)", marginTop: "0.5rem", marginBottom: 0 } }, opt.description) : null
          );
          })
        )
      )
    );
  }

  function renderQuizSlide() {
    var q = quizQuestions[quizIndex];
    if (!q) return e("div", null, "Loading quiz...");
    var qType = q.questionType || "pick-one";
    var isMulti = qType === "pick-many";
    var isTextEntry = qType === "text-entry";
    var wasCorrect = false;
    if (answered && !isTextEntry) {
      if (isMulti) {
        wasCorrect = q.choices.every(function(c, i) { var isSel = selectedChoices.indexOf(i) >= 0; return c.isCorrect ? isSel : !isSel; });
      } else { wasCorrect = q.choices[selectedChoice] && q.choices[selectedChoice].isCorrect; }
    }
    var progressPct = totalQ > 0 ? Math.round(((quizIndex + (answered ? 1 : 0)) / totalQ) * 100) : 0;
    return e("div", { className: "quiz-container" },
      e("div", { className: "quiz-progress-bar" },
        e("div", { className: "quiz-progress-fill", style: { width: progressPct + "%" } })
      ),
      e("p", { className: "quiz-counter" }, "Question " + (quizIndex + 1) + " of " + totalQ),
      e("div", { key: "qk" + quizAnimKey, className: "quiz-slide-enter" },
        e("div", { className: "quiz-question" }, q.questionText),
        isTextEntry ? e("div", { className: "quiz-text-entry" },
          e("input", { type: "text", placeholder: "Type your answer...", value: textAnswer, disabled: answered,
            onChange: function(ev) { setTextAnswer(ev.target.value); },
            onKeyDown: function(ev) { if (ev.key === "Enter" && textAnswer.trim()) submitTextAnswer(); }
          }),
          !answered && textAnswer.trim() ? e("div", { className: "actions" },
            e("button", { className: "btn btn-primary", onClick: submitTextAnswer }, "Submit Answer")) : null
        ) :
        e("div", { className: "quiz-choices" },
          q.choices.map(function(c, i) {
            var cls = "quiz-choice";
            var isSel = isMulti ? selectedChoices.indexOf(i) >= 0 : selectedChoice === i;
            if (isSel) cls += " selected";
            if (answered && c.isCorrect) cls += " correct";
            if (answered && isSel && !c.isCorrect) cls += " incorrect";
            return e("div", { className: cls, key: i, onClick: function() { handleQuizAnswer(i); } },
              e("div", { className: "indicator" + (isMulti ? " checkbox" : "") },
                answered ? (c.isCorrect ? "\u2713" : (isSel ? "\u2717" : "")) : (isSel ? (isMulti ? "\u2713" : "\u25CF") : "")
              ),
              e("span", null, c.text)
            );
          })
        )
      ),
      isMulti && !answered && selectedChoices.length > 0 ? e("div", { className: "actions" },
        e("button", { className: "btn btn-primary", onClick: submitMultiAnswer }, "Submit Answer")) : null,
      answered ? e("div", { className: "quiz-feedback " + (isTextEntry ? "correct" : (wasCorrect ? "correct" : "incorrect")) },
        isTextEntry ? "Answer submitted" : (wasCorrect ? (q.correctFeedback || "Correct!") : (q.incorrectFeedback || "Incorrect."))) : null,
      answered ? e("div", { className: "actions" },
        e("button", { className: "btn btn-primary", onClick: nextQuestion },
          quizIndex < quizQuestions.length - 1 ? "Next Question" : "See Results")) : null
    );
  }

  function renderResultsSlide(slide, key) {
    var displayScore = score !== null ? score : 0;
    var passed = displayScore >= MASTERY;
    var ringStyle = {
      background: "conic-gradient(rgba(255,255,255,0.9) " + (displayScore * 3.6) + "deg, rgba(255,255,255,0.15) " + (displayScore * 3.6) + "deg)"
    };
    var celebrationDots = [];
    if (passed) {
      for (var i = 0; i < 12; i++) {
        var colors = ["#FFD700", "#FF6B6B", "#4ECDC4", "#45B7D1", "#96CEB4", "#FFEAA7"];
        celebrationDots.push(
          e("div", {
            key: "dot" + i,
            className: "celebration-dot",
            style: {
              left: (10 + Math.random() * 80) + "%",
              top: (40 + Math.random() * 40) + "%",
              background: colors[i % colors.length],
              animationDelay: (i * 0.15) + "s",
              width: (6 + Math.random() * 6) + "px",
              height: (6 + Math.random() * 6) + "px"
            }
          })
        );
      }
    }
    return e("div", { key: key },
      passed ? e("div", { className: "celebration-dots" }, celebrationDots) : null,
      e("h2", null, slide.title || "Your Results"),
      e("div", { className: "score-circle" },
        e("div", { className: "score-ring", style: ringStyle }),
        e("div", { className: "score-value" }, displayScore + "%"),
        e("div", { className: "score-label" }, passed ? "Passed" : "Not passed")
      ),
      e("p", { className: "results-msg" },
        passed ? "Congratulations! You have successfully completed this course."
          : "You need " + MASTERY + "% to pass. Please try again."),
      !passed ? e("button", {
        className: "btn btn-restart",
        onClick: function() { window.scrollTo({ top: 0, behavior: "smooth" }); setQuizState(null); setScore(null); }
      }, "Restart Course") : null
    );
  }

  return e("div", null,
    e("div", { className: "progress-bar" }, e("div", { className: "progress-fill", style: { width: "0%" } })),
    e("div", { className: "course-scroll" },
      SECTIONS.map(function(section, si) {
        return renderSection(section, si);
      })
    ),
    quizState === "active" && quizQuestions.length > 0 ? e("div", { className: "quiz-section", style: {
      position: "fixed", inset: 0, zIndex: 900, background: "var(--bg)", overflowY: "auto"
    } }, renderQuizSlide()) : null,
    modalLayer !== null ? renderModalOverlay() : null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
