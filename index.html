ybrid vehicles currently available. Recognise alternative fuel source vehicles and understand the differences between BEV, HEV, and PHEV.</p>"},{"title":"Understand High-Voltage Hazards","body":"<p>State the hazards associated with high-energy electricity. Understand the risks that may be present when connecting and charging electric/hybrid vehicles.</p>"},{"title":"Work Safely Around EVs","body":"<p>State safety precautions to take before approaching and working around electric/hybrid vehicles. Identify high-energy cabling and associated components.</p>"},{"title":"Safe Charging Procedures","body":"<p>Understand how vehicles may be safely charged using an external source. Know the correct procedures and terminology for EV charging.</p>"}]},{"_id":"comp-003","_parentId":"block-comp-003","_type":"component","_component":"textinput","displayTitle":"Learner Registration","title":"Learner Registration","body":"<p>Please enter your details before continuing.</p>","instruction":"","_items":[{"prefix":"Name","placeholder":"Enter your full name"},{"prefix":"Organisation","placeholder":"Enter your organisation"},{"prefix":"Email","placeholder":"Enter your email address"}]},{"_id":"comp-010","_parentId":"block-comp-010","_type":"component","_component":"text","displayTitle":"Why Identification Matters","title":"Why Identification Matters","body":"<p>It is critical that you can recognise an electric vehicle when it enters your workplace. Identifying features will differ between manufacturers, so you may need to exercise your skill and experience to determine the vehicle type — getting it wrong could be dangerous.</p>","instruction":""},{"_id":"comp-011","_parentId":"block-comp-011","_type":"component","_component":"graphic-text","displayTitle":"Exterior Identification","title":"Exterior Identification","body":"<p>Look for these key exterior features:</p><ul><li><strong>Number plate:</strong> Full EVs may have a green border (not mandatory)</li><li><strong>Badging:</strong> Many EVs display a badge indicating electric power</li><li><strong>Charge port:</strong> BEVs and PHEVs have a battery charge connector port on the vehicle exterior</li></ul>","instruction":"","_graphic":{"large":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAJAAwADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD5/ooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKAClpKWmgFFbnhzVX0vUEmQ9CCQTweawqejFGBHavTy7F/Vq8ZtXXX0IlG6sfTc/j3RfEvgyWCaZLe62rujc9x6V86ahIHuHwcjJp8NzvQAsQak+w+byT1r6apl9KdBxwjupO+vQ5Yx5JucjJNMNW7q0aBsdRVQqa+TxWGqUJuE1qdcWmrobRS4pK42UL2ooFFMBKKXvQwwamwCUqkg5BwaSikBZjupEBUtlT1FOgvDbSSOiqS6lfmHTNVKKbdyeRBRRRSKCiiigAooooAKKKKACiiigApaSlzVIApDS0lDAKWkopIBcUmKWlxTAbRT9tG2iwrjKKcVpMUDCiiigApKWkoYBRS7SexpRG56K35UrMLjaKkFvMekbflTxZXB6Qt+VPkk+hPMu5BRVsaddH/lk1PGlXR/gxVKlN9BOpBdSjRWkui3J64FPGhzHq4FUsPUfQh16a6mVRWyugt3kH5VINBXvKatYSq+hLxVJdTCoroRoUI6uTUi6LbDrk1SwVQl4ykc1RiupXSLQfwVIumWq/8ALMVawE+5Dx1PscntJ7GlEbH+E/lXXixtx0jFSLawjpGtWsvfVkPHx7HHCCQ9Eb8qeLSc9I2rsRCg6Iv5U8IB2FWsvXVkPMe0Tjl065b/AJZmpV0m5P8ADXW7RSgVosvgQ8wn0Ryy6JcHrx+FSroMx6tXS4pQK0WBpdiHj6hzy+Hz/E1Sr4fTuxrd20u2tFg6S6GbxtV9TGXQYB1JNSrotsO1au2lC1osNTXQyeKqvqZy6Vbr/BUi6fAOiCr22l21oqMV0M3Xm+pUWzhH8AqQW0Y6IKshaXbWiprsZurJ9SERKP4RTgg9KlC04JVqJDmRhaXbUuynBKpRJ5yELTgtTBKcEpqJLmeWUU tive workshop"},"overlayPosition":"center"},{"_id":"comp-031","_parentId":"block-comp-031","_type":"component","_component":"text","displayTitle":"High-Voltage Hazards in the Workplace","title":"High-Voltage Hazards in the Workplace","body":"<p>Electric and hybrid vehicles introduce hazards into the workplace in addition to those normally associated with vehicle repair and maintenance. Understanding these risks is the first step to working safely.</p>","instruction":""},{"_id":"comp-032","_parentId":"block-comp-032","_type":"component","_component":"accordion","displayTitle":"Key Risks of Working with EVs","title":"Key Risks of Working with EVs","body":"","instruction":"Select each risk category to learn more.","_items":[{"title":"Fatal Electric Shock","body":"<p>The presence of high-voltage components and cabling capable of delivering a fatal electric shock. Voltages in EVs can reach up to 650V DC — significantly higher than the 12/24V found in conventional vehicles. Components may retain dangerous voltage even when the vehicle is switched off.</p>"},{"title":"Fire & Explosion Risk","body":"<p>The storage of electrical energy with the potential to cause explosion or fire. Stored electrical energy can be released suddenly if batteries are damaged or incorrectly modified, releasing explosive gases and harmful chemicals.</p>"},{"title":"Silent Operation","body":"<p>Electric motors operate silently, meaning people may be unaware of vehicles moving. Most EVs are fitted with a pedestrian sound emitter, but this may not always be active in workshop environments.</p>"},{"title":"Unexpected Movement","body":"<p>Electric motors can generate magnetic forces that cause unexpected movement. Remote operation keys that only need to be near the vehicle can accidentally power it up.</p>"},{"title":"Medical Device Interference","body":"<p>High-voltage electrical systems may affect medical devices such as pacemakers. Staff with such devices should be made aware of this risk.</p>"},{"title":"Battery Handling","body":"<p>Manual handling risks associated with battery replacement. Batteries are extremely heavy. Hybrid vehicles also retain a conventional fuel tank, adding further complexity.</p>"}]},{"_id":"comp-033","_parentId":"block-comp-033","_type":"component","_component":"key-term","displayTitle":"Legislation & Standards","title":"Legislation & Standards","body":"","instruction":"","_items":[{"term":"HSE Guidelines","definition":"The UK Health and Safety Executive provides specific guidance for working with electric and hybrid vehicles in the motor vehicle repair industry. Source: hse.gov.uk/mvr/topics/electric-hybrid.htm"},{"term":"ECE R100 Certification","definition":"A UN regulation that defines 'High Voltage' as >60V to ≤1500V DC (or >30V to ≤1000V AC). This is the standard used when referring to electric vehicle high-voltage systems."},{"term":"HSE Work Categories","definition":"The UK HSE identifies 4 categories of EV work: valeting/sales (low risk), incident response, routine maintenance, and high-voltage system work (specialist only)."}]},{"_id":"comp-034","_parentId":"block-comp-034","_type":"component","_component":"timeline","displayTitle":"Low-Risk Activity Precautions","title":"Low-Risk Activity Precautions","body":"<p>Even for valeting, sales, and other lower-risk activities around EVs, these precautions must be followed:</p>","instruction":"","_items":[{"title":"Secure the Key Fob","body":"<p>Keep remote operation keys away from the vehicle to prevent accidental power-up. Use a signal-blocking pouch if available.</p>"},{"title":"Be Aware of Silent Movement","body":"<p>People moving EVs around the workplace should be aware that others may not hear them approaching. Sound your horn when necessary.</p>"},{"title":"Avoid Pressure Washing HV Components","body":"<p>High-pressure water can damage high-voltage electrical components and cables. Orange cables indicate HV systems — refer to manufacturer guidance before valeting in these areas.</p>"},{"title":"Never Touch Orange Cables","body":"<p>Orange cables carry high voltage. Never handle, move, or lean tools against them. Report any visible damage immediately.</p>"}]},{"_id":"comp-040","_parentId":"block-comp-040","_type":"component","_component":"graphic-text","displayTitle":"What Is an Electric Shock?","title":"What Is an Electric Shock?","body":"<p>A voltage as low as <strong>50 volts</strong> applied between two parts of the human body causes a current to flow that can block the electrical signals between the brain and the muscles.</p><p>This may cause:</p><ul><li>Stopping the heart beating properly</li><li>Preventing the person from breathing</li><li>Causing muscle spasms</li><li>Secondary injuries such as burns and fall injuries</li></ul>","instruction":"","_graphic":{"large":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAJAAwADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDxGloorvOMSloooAKKKKACiiigAooooAWkoooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAopKKAFpKKW r-to-finger on the same hand is less severe but still harmful.</p>"},{"title":"Duration of Contact","body":"<p>Even fractions of a second of contact with high voltage can be fatal. Muscle spasms may prevent the person from releasing their grip, prolonging exposure.</p>"},{"title":"Skin Conductivity","body":"<p>Wet or sweaty skin dramatically reduces resistance, allowing more current to flow. Always ensure dry conditions when near HV components.</p>"}]},{"_id":"comp-042","_parentId":"block-comp-042","_type":"component","_component":"process-flow","displayTitle":"Emergency Response Procedure","title":"Emergency Response Procedure","body":"<p>If you encounter someone receiving an electric shock, follow these steps in order:</p>","instruction":"","_nodes":[{"title":"Assess the Situation","body":"Do NOT touch the casualty if they are still in contact with the electrical source. You are at risk of electrocution.","type":"start"},{"title":"Isolate the Power Source","body":"For mains chargers, turn off power at the isolation switch. For vehicle HV systems, turn off the vehicle using the normal key. Consider that the vehicle may not be safe even when switched off.","type":"process"},{"title":"Separate Casualty from Source","body":"If safe to do so, use a purpose-designed insulated rescue hook to separate the casualty from the power supply. Never use bare hands or conductive materials.","type":"process"},{"title":"Call 999","body":"Call emergency services immediately. Provide details about the high-voltage nature of the incident.","type":"process"},{"title":"Provide First Aid","body":"Once contact is broken, perform a primary survey and treat injuries. Seek assistance from trained first aiders on site.","type":"process"},{"title":"Secure the Scene","body":"Cordon off the vehicle using a non-conductive safety barrier chain. Ensure no one else attempts to work on it until it has been made safe by a specialist.","type":"end"}]},{"_id":"comp-050","_parentId":"block-comp-050","_type":"component","_component":"text","displayTitle":"Essential EV Safety Equipment","title":"Essential EV Safety Equipment","body":"<p>When electric vehicles enter your workplace, specific safety equipment must be available and correctly used. The following items should be present in any workshop or facility that handles EVs.</p>","instruction":""},{"_id":"comp-051","_parentId":"block-comp-051","_type":"component","_component":"tabs","displayTitle":"Equipment Guide","title":"Equipment Guide","body":"","instruction":"","_items":[{"title":"Vehicle ID Sign","body":"<p>Should be present on every electric vehicle entering a workshop for repair so that all staff are aware it is an EV. This is the primary visual indicator that special precautions apply.</p>"},{"title":"Barrier Chain","body":"<p>A non-conductive safety barrier chain or cordon that alerts others and prevents unauthorised access to the EV work area. Must be non-conductive to prevent creating an additional electrical path.</p>"},{"title":"Key Signal Blocker","body":"<p>A pouch or case that prevents accidental power-up on keyless-start vehicles by blocking the key from receiving and sending signals to the vehicle. Essential for preventing unexpected movement.</p>"},{"title":"Rescue Hook","body":"<p>An insulated hook to be used by suitably trained staff in an emergency to remove a casualty from the source of an electric shock. Must be rated for the voltages present and regularly inspected.</p>"},{"title":"Insulated Gloves","body":"<p>Class 0 insulated gloves rated to 1500V DC. Should be worn by suitably trained persons when working on the high-voltage system. Must be inspected before each use for tears or damage.</p>"},{"title":"Warning Signs","body":"<p>Signs that alert others to the risks present in the EV work area. Includes 'Do Not Start / Work in Progress' signs to prevent unauthorised starting during repair.</p>"}]},{"_id":"comp-052","_parentId":"block-comp-052","_type":"component","_component":"mcq","displayTitle":"Equipment Knowledge Check","title":"Equipment Knowledge Check","body":"<p>What is the primary purpose of a key signal blocker pouch?</p>","instruction":"Choose the best answer.","_items":[{"text":"Prevents the key from being stolen","_shouldBeSelected":false},{"text":"Prevents accidental power-up on keyless-start vehicles by blocking key signals","_shouldBeSelected":true},{"text":"Stops the key from being lost","_shouldBeSelected":false}],"_selectable":1,"_feedback":{"correct":"<p>Correct! The signal blocker prevents the vehicle from detecting the key and accidentally powering up, which could cause unexpected movement.</p>","_incorrect":{"final":"<p>Not quite. The primary purpose is to block the key's signals, preventing the vehicle from accidentally powering up when someone is working near it.</p>"}}},{"_id":"comp-053","_parentId":"block-comp-053","_type":"component","_component":"mcq","displayTitle":"Rescue Equipment Check","title":"Rescue Equipment Check","body":"<p>What is the purpose of an insulated rescue hook?</p>","instruction":"Choose the best answer.","_items":[{"text":"To be used by suitably trained staff in an emergency to remove a casualty from an electric shock source","_shouldBeSelected":true},{"text":"To move high-voltage cables away from the car if they become short-circuited","_shouldBeSelected":false},{"text":"To pull damaged battery packs out of the vehicle","_shouldBeSelected":false}],"_selectable":1,"_feedback":{"correct":"<p>Correct! The rescue hook is specifically designed to safely separate a person from an electrical source without the rescuer making direct contact.</p>","_incorrect":{"final":"<p>The rescue hook's primary purpose is to safely remove a casualty from contact with an electrical source during an emergency.</p>"}}},{"_id":"comp-060","_parentId":"block-comp-060","_type":"component","_component":"graphic-text","displayTitle":"Understanding Charging","title":"Understanding Charging","body":"<p>To work safely around EV charging systems, you need to understand the basic electrical terminology. These concepts determine charging speed, cable ratings, and safety thresholds.</p>","instruction":"","_graphic":{"large":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAJAAwADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDw6loqWC3knYBB+NbnPsMVSxAAya2NP0gswklH4VcsNMWJQzjJ9TV2W6jt1wCK1jHuYyn2LCeXaR9qytQ1XOQD+FULzU2ckKay2dnOSaHO2wRhfVkk07zNyeKh4FBOKaTms2zVIUtTaKKm5VgooopDCiiigAooooAWiiigAoopaYgooopgFFGaKBBRkjoaKKYDg7DvThK1R0oouKxOJTS+cfWoQaDT5mLlRYE3vThLVPNKGNPmFyl0SCl3iqW80okNPmFyl3IpapiWnib3p3FylnFJioRNSiYUXQrEvArQsdd1XTHDWWo3MBH9yQgflWZ5g9aUMKdxOKe53mn/ABb8WWIAe8julHaeMH9Rg11Nh8d5lwuoaMjerQS4/Qj+teOZop6PoTyLofRmn/GTwteYFw1zaMf+eseR+a5rqrDxToOpgfY9WtJCf4fMAP5HmvkqlDEcgkH2qeWLD3l1PstSGGVIIPcUtfItl4i1nTSDZ6ndQ47LKcflXT6f8XPFtjgPeR3SjtNED+owan2fZj5mt0fSlLXidh8dphgaho6N6tDIR+hrqtP+Mnhe82rO9xaMf+ekeQPxFL2cg9oup6FUU1vDcLtmhSRfR1BrNsPFGhamB9j1W1lJ7CQA/ka1gwYZBBHqKmzQ7xZzeoeAPDOpZM2lxo5/iiyh/SuR1T4JaZOrNp9/PA/ZZMOK9SzQTimqkl1JdKHY+U/E/gnVPDV6ILhfMVj8kiDhqqQ+D/EE8PnR6VdPGRnIjNfTGpaVba1eR+ciuIWzz61twxLDGqIAFAwAK3lOCSdtTKHtG2uh8fXWlXtk225tJoj/ALaEVUK+1fZNxZ212hS4t4pVPZ1BrmdR+G/hfUSTJpkcbH+KI7ahTg/I0/eLzPlrbSFa961H4IadLlrG/lhPZXXcK5PUPgv4gtiTavBcqOm1tpP51Vk9mHtGt0eYbaX OGNV+1Wbf/Vk+9KO457E1JS0lWZBTadTaACkpaKAEopcUlIYUUUUAFFFFAC5pKKKACiiigAooooAKKKKANSL/AFCUtNi/1CfSnVsjB7hSUtJQIKRvun6UtIfun6UwRz56mmmnHqaaa4z0EXU+4v0qJvvGpk+4v0qFvvGtHsZLcSnw/wCtT/eFMp8P+uT/AHhSW43sa1FFFdByBRRSUAFLSUtABQOoooHUUAjVJ/0BRWZd/dX6VptxYpWZd9F+lKJUt0ZV591PrVSrV591PrVWuefxHVT+ESiiioNAp8XVv900ynx9W/3TTQmN/hNQd6sAcGq561LKiPFOpq06gGTRfdp9Mh+6akrRGL3EpcUYpQKYj//Z","alt":"Modern EV charging station with illuminated connector"},"_imageAlign":"right"},{"_id":"comp-061","_parentId":"block-comp-061","_type":"component","_component":"flashcard","displayTitle":"Key Electrical Terms","title":"Key Electrical Terms","body":"","instruction":"Click each card to reveal the definition.","_items":[{"front":"What are Watts?","back":"Watts measure energy consumption — the rate at which electrical energy is used or generated. We're familiar with this from household items like lightbulbs. EV chargers are rated in kilowatts (kW)."},{"front":"What are Amps?","back":"Amps (amperes) measure electrical current — the flow of electricity through a circuit. There is a relationship between voltage, amps, and resistance. A higher amp reading means more current is flowing."},{"front":"What is Voltage?","back":"Voltage is electrical pressure — the force that pushes current through a circuit. ICE vehicles use 12V, trucks use 24V, but EVs operate at 400-650V DC. This is why EV electrical systems are so dangerous."},{"front":"What does kWh mean?","back":"Kilowatt-hours measure battery capacity — how much energy the battery can store. A larger kWh rating means greater range. Typical EV batteries range from 40kWh to 100kWh."}]},{"_id":"comp-070","_parentId":"block-comp-070","_type":"component","_component":"key-term","displayTitle":"Key Terms Reference","title":"Key Terms Reference","body":"","instruction":"","_items":[{"term":"Arc Flash","definition":"A sudden release of electrical energy through the air when a high-voltage gap is breached. Can cause serious burns, injuries, or equipment damage."},{"term":"BEV","definition":"Battery Electric Vehicle — powered entirely by a rechargeable battery pack with no internal combustion engine."},{"term":"HEV","definition":"Hybrid Electric Vehicle — combines a conventional engine with an electric motor. Battery charges through regenerative braking only."},{"term":"PHEV","definition":"Plug-in Hybrid Electric Vehicle — has both a combustion engine and electric motor with external charging capability."},{"term":"ECE R100","definition":"The UN regulation defining high voltage as >60V to ≤1500V DC for electric vehicles. Specifies all required safety tests for EV approval."}]},{"_id":"comp-071","_parentId":"block-comp-071","_type":"component","_component":"text","displayTitle":"Course Complete","title":"Course Complete","body":"<p>You have completed the EV Awareness & Safety course. Remember: always identify the vehicle type before beginning any work, never touch orange cables, and follow your organisation's specific EV safety procedures.</p><p>If you have any questions about working with electric vehicles, consult your workshop manager or a suitably trained EV specialist.</p>","instruction":""}]};</script>
