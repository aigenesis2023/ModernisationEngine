<section class="py-32 px-6 max-w-5xl mx-auto" data-component-type="timeline">
<h3 class="text-3xl font-bold text-center mb-20">Emergency Response Sequence</h3>
<div class="relative space-y-12">
<div class="absolute left-[15px] md:left-1/2 top-0 bottom-0 w-px bg-white/10"></div>
<div class="relative flex flex-col md:flex-row items-center md:justify-between group">
<div class="md:w-5/12 text-left md:text-right">
<h4 class="text-xl font-bold text-primary">Alert</h4>
<p class="text-slate-500">Trigger the alarm and notify others immediately.</p>
</div>
<div class="absolute left-0 md:left-1/2 -translate-x-[4px] md:-translate-x-1/2 w-4 h-4 rounded-full bg-primary border-4 border-surface-dim z-10 group-hover:scale-150 transition-transform"></div>
<div class="hidden md:block md:w-5/12"></div>
</div>
<div class="relative flex flex-col md:flex-row items-center md:justify-between group">
<div class="hidden md:block md:w-5/12"></div>
<div class="absolute left-0 md:left-1/2 -translate-x-[4px] md:-translate-x-1/2 w-4 h-4 rounded-full bg-secondary border-4 border-surface-dim z-10 group-hover:scale-150 transition-transform"></div>
<div class="md:w-5/12 text-left">
<h4 class="text-xl font-bold text-secondary">Assess</h4>
<p class="text-slate-500">Quickly evaluate the nature of the emergency.</p>
</div>
</div>
<div class="relative flex flex-col md:flex-row items-center md:justify-between group">
<div class="md:w-5/12 text-left md:text-right">
<h4 class="text-xl font-bold text-tertiary">Act</h4>
<p class="text-slate-500">Apply primary response skills (Fire, First Aid).</p>
</div>
<div class="absolute left-0 md:left-1/2 -translate-x-[4px] md:-translate-x-1/2 w-4 h-4 rounded-full bg-tertiary border-4 border-surface-dim z-10 group-hover:scale-150 transition-transform"></div>
<div class="hidden md:block md:w-5/12"></div>
</div>
</div>
</section>
