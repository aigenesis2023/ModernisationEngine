<section class="max-w-2xl mx-auto glass-panel p-10 rounded-xl border border-white/5" data-component-type="textinput">
<h3 class="text-2xl font-bold mb-8">Curator Feedback</h3>
<form class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Your Signature</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 px-0 py-3 focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-neutral-600" placeholder="Enter your full name..." type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Evolution Notes</label>
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant/30 px-0 py-3 focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-neutral-600 resize-none" placeholder="How has your perspective shifted?" rows="4"></textarea>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-bold rounded-lg hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary/20" type="submit">
                    Transmit Response
                </button>
</form>
</section>
