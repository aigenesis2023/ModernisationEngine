<section class="py-32 px-8 max-w-4xl mx-auto" data-component-type="textinput">
<div class="bg-surface-container-high p-12 rounded-3xl border border-outline-variant/20 shadow-2xl">
<h2 class="text-4xl font-headline font-bold text-white mb-8">Safety Commitment</h2>
<form class="space-y-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div>
<label class="block text-xs uppercase text-on-surface-variant font-bold mb-3">Full Name</label>
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-white p-4" type="text"/>
</div>
<div>
<label class="block text-xs uppercase text-on-surface-variant font-bold mb-3">Department</label>
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-white p-4" type="text"/>
</div>
</div>
<div>
<label class="block text-xs uppercase text-on-surface-variant font-bold mb-3">Your Top Safety Priority</label>
<textarea class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-white p-4 h-32"></textarea>
</div>
<button class="primary-gradient w-full py-5 rounded-full font-headline font-bold uppercase tracking-widest text-on-primary-fixed">Sign &amp; Finalize</button>
</form>
<div class="mt-16 p-8 bg-surface-container rounded-xl" data-component-type="branching">

<div class="flex gap-4">
<button class="bg-surface-bright text-xs font-bold uppercase p-4 flex-1 rounded hover:bg-error transition-colors">Cleanup Immediately</button>
<button class="bg-surface-bright text-xs font-bold uppercase p-4 flex-1 rounded hover:bg-primary hover:text-on-primary-fixed transition-colors">Secure Area &amp; Report</button>
</div>
</div>
</div>
</section>
