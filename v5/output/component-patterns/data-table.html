<section class="py-32 px-8 bg-surface" data-component-type="data-table">
<div class="max-w-5xl mx-auto">
<h2 class="font-headline text-4xl font-bold mb-12 text-center">Incident Classification Matrix</h2>
<div class="overflow-hidden rounded-2xl border border-outline-variant/10 shadow-sm">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container-high font-bold">
<tr>
<th class="p-6">Severity Level</th>
<th class="p-6">Description</th>
<th class="p-6">Response Time</th>
</tr>
</thead>

</tr>
<tr class="hover:bg-surface-container-low transition-colors">
<td class="p-6 font-bold text-primary flex items-center gap-2"><span class="w-3 h-3 bg-primary rounded-full"></span> Minor</td>
