<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test intro scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
:root {
  --primary: #3C087E;
  --secondary: #030014;
  --accent: #7c3aed;
  --bg: #030014;
  --surface: #0f0a1e;
  --text: #ffffff;
  --text-muted: #a1a1aa;
  --success: #10b981;
  --error: #ef4444;
  --warning: #f59e0b;
  --radius: 12px;
  --font-heading: 'Inter', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --spacing: 8px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#root { width: 100vw; height: 100vh; overflow: hidden; }

/* ---- Layout ---- */
.app { width: 100%; height: 100%; display: flex; flex-direction: column; }
.slide-container {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  position: relative; scroll-behavior: smooth;
}
.slide {
  min-height: 100%; padding: calc(var(--spacing) * 6) calc(var(--spacing) * 4);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- Typography ---- */
h1, h2, h3 {
  font-family: var(--font-heading);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
h1 { font-size: 40px; margin-bottom: calc(var(--spacing) * 3); }
h2 { font-size: 32px; margin-bottom: calc(var(--spacing) * 2); }
h3 { font-size: 24px; margin-bottom: var(--spacing); }
p { margin-bottom: var(--spacing); max-width: 680px; }

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: calc(var(--spacing) * 1.5) calc(var(--spacing) * 4);
  border: none; border-radius: var(--radius);
  font-family: var(--font-body); font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  text-decoration: none; min-width: 140px;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--primary); color: white; border: none;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 15px #3C087E44; }

.btn-secondary {
  background: transparent; color: var(--primary);
  border: 2px solid var(--primary);
}
.btn-secondary:hover { background: var(--primary); color: white; }

.btn-ghost {
  background: transparent; color: var(--text-muted);
  border: 1px solid rgba(0,0,0,0.1);
}
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

/* ---- Cards ---- */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: calc(var(--spacing) * 3);
  width: 100%; max-width: 760px;
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  transition: all var(--transition);
}

/* ---- Title Slide ---- */
.slide-title {
  background: linear-gradient(135deg, #3C087E, #7c3aed);
  color: white; text-align: center;
  padding: 0; justify-content: center; align-items: center;
  position: relative; overflow: hidden;
}
.slide-title::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.1) 0%, transparent 60%);
}
.slide-title .content { position: relative; z-index: 2; max-width: 720px; }
.slide-title h1 { font-size: 52px; margin-bottom: calc(var(--spacing) * 2); color: white; }
.slide-title .subtitle { font-size: 19px; opacity: 0.85; margin-bottom: calc(var(--spacing) * 4); }
.slide-title .logo { max-width: 200px; max-height: 60px; margin-bottom: calc(var(--spacing) * 3); }
.slide-title .btn { background: white; color: var(--primary); font-weight: 700; }
.slide-title .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

/* ---- Content Slide ---- */
.slide-content { background: var(--bg); }
.slide-content .card { margin-bottom: calc(var(--spacing) * 2); }

/* ---- Form Slide ---- */
.form-group { margin-bottom: calc(var(--spacing) * 2); width: 100%; }
.form-group label {
  display: block; font-weight: 600; margin-bottom: calc(var(--spacing) * 0.5);
  color: var(--text);
}
.form-group input, .form-group textarea {
  width: 100%; padding: calc(var(--spacing) * 1.5);
  border: 2px solid rgba(0,0,0,0.1); border-radius: var(--radius);
  font-family: var(--font-body); font-size: 16px;
  transition: border-color var(--transition);
  background: var(--bg); color: var(--text);
}
.form-group input:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px #3C087E22;
}

/* ---- Quiz Slide ---- */
.quiz-question {
  font-family: var(--font-heading); font-size: 24px;
  font-weight: 700; margin-bottom: calc(var(--spacing) * 3);
  text-align: center; max-width: 680px;
}
.quiz-choices { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: var(--spacing); }
.quiz-choice {
  display: flex; align-items: center; gap: calc(var(--spacing) * 1.5);
  padding: calc(var(--spacing) * 2) calc(var(--spacing) * 2.5);
  border: 2px solid rgba(0,0,0,0.08); border-radius: var(--radius);
  cursor: pointer; transition: all var(--transition);
  background: var(--surface); font-size: 16px;
}
.quiz-choice:hover { border-color: var(--primary); transform: translateX(4px); }
.quiz-choice.selected { border-color: var(--primary); background: #3C087E11; }
.quiz-choice.correct { border-color: var(--success); background: #10b98111; }
.quiz-choice.incorrect { border-color: var(--error); background: #ef444411; }
.quiz-choice .indicator {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.quiz-choice.selected .indicator { border-color: var(--primary); background: var(--primary); }
.quiz-choice.correct .indicator { border-color: var(--success); background: var(--success); }
.quiz-choice.incorrect .indicator { border-color: var(--error); background: var(--error); }
.quiz-feedback {
  margin-top: calc(var(--spacing) * 2); padding: calc(var(--spacing) * 2);
  border-radius: var(--radius); text-align: center; font-weight: 600;
  animation: slideIn 0.3s ease-out;
}
.quiz-feedback.correct { background: #10b98115; color: var(--success); }
.quiz-feedback.incorrect { background: #ef444415; color: var(--error); }

/* ---- Branching Slide ---- */
.branch-options { display: flex; gap: calc(var(--spacing) * 2); flex-wrap: wrap; justify-content: center; margin-top: calc(var(--spacing) * 3); }
.branch-option {
  padding: calc(var(--spacing) * 3) calc(var(--spacing) * 4);
  border: 2px solid rgba(0,0,0,0.08); border-radius: var(--radius);
  cursor: pointer; transition: all var(--transition);
  text-align: center; min-width: 180px;
  background: var(--surface);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.branch-option:hover {
  border-color: var(--primary); transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}
.branch-option h3 { color: var(--primary); }

/* ---- Results Slide ---- */
.slide-results {
  background: linear-gradient(135deg, #3C087E, #7c3aed);
  color: white; text-align: center;
}
.score-circle {
  width: 160px; height: 160px; border-radius: 50%;
  border: 6px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  margin: calc(var(--spacing) * 3) auto;
  animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.score-circle .score-value { font-size: 48px; font-weight: 700; font-family: var(--font-heading); }
.score-circle .score-label { font-size: 14px; opacity: 0.8; }

@keyframes scaleIn {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ---- Progress Bar ---- */
.progress-bar {
  height: 4px; background: #3C087E22;
  position: sticky; top: 0; z-index: 100;
}
.progress-fill {
  height: 100%; background: var(--primary);
  transition: width 0.4s ease;
}

/* ---- Navigation ---- */
.nav-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: calc(var(--spacing) * 1.5) calc(var(--spacing) * 3);
  background: var(--surface); border-top: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
}
.nav-bar .slide-counter { color: var(--text-muted); font-size: 14px; }

/* ---- Hero Image ---- */
.hero-image {
  width: 100%; max-width: 760px; border-radius: var(--radius);
  overflow: hidden; margin-bottom: calc(var(--spacing) * 3);
  backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.hero-image img { width: 100%; height: auto; display: block; }

/* ---- Responsive ---- */
@media (max-width: 768px) {
  .slide { padding: calc(var(--spacing) * 3) calc(var(--spacing) * 2); }
  h1 { font-size: 28px; }
  h2 { font-size: 24px; }
  .slide-title h1 { font-size: 34px; }
  .score-circle { width: 120px; height: 120px; }
  .score-circle .score-value { font-size: 36px; }
  .branch-options { flex-direction: column; align-items: center; }
  .branch-option { width: 100%; max-width: 320px; }
}
</style>

  <script>
// SCORM 1.2 Communication Adapter
var SCORM = (function() {
  var api = null;
  var initialized = false;
  var completed = false;

  function findAPI(win) {
    var attempts = 0;
    while (win && !win.API && attempts < 10) {
      if (win.parent && win.parent !== win) { win = win.parent; }
      else if (win.opener) { win = win.opener; }
      else { break; }
      attempts++;
    }
    return win ? win.API : null;
  }

  function init() {
    api = findAPI(window);
    if (!api) {
      console.warn('[SCORM] No LMS API found — running in standalone mode');
      return false;
    }
    var result = api.LMSInitialize('');
    initialized = (result === 'true' || result === true);
    if (initialized) {
      api.LMSSetValue('cmi.core.lesson_status', 'incomplete');
      api.LMSCommit('');
    }
    return initialized;
  }

  function setValue(key, value) {
    if (!api || !initialized) return false;
    var result = api.LMSSetValue(key, String(value));
    api.LMSCommit('');
    return result === 'true' || result === true;
  }

  function getValue(key) {
    if (!api || !initialized) return '';
    return api.LMSGetValue(key);
  }

  function setScore(score, max, min) {
    setValue('cmi.core.score.raw', score);
    setValue('cmi.core.score.max', max || 100);
    setValue('cmi.core.score.min', min || 0);
  }

  function setStatus(status) {
    setValue('cmi.core.lesson_status', status);
  }

  function complete(score, passingScore) {
    if (completed) return;
    completed = true;
    if (typeof score === 'number') {
      setScore(score);
      setStatus(score >= (passingScore || 80) ? 'passed' : 'failed');
    } else {
      setStatus('completed');
    }
  }

  function suspend(data) {
    if (data) setValue('cmi.suspend_data', JSON.stringify(data));
    setValue('cmi.core.exit', 'suspend');
  }

  function getSuspendData() {
    var raw = getValue('cmi.suspend_data');
    try { return raw ? JSON.parse(raw) : null; }
    catch(e) { return null; }
  }

  function finish() {
    if (!api || !initialized) return;
    api.LMSFinish('');
  }

  return {
    init: init,
    setValue: setValue,
    getValue: getValue,
    setScore: setScore,
    setStatus: setStatus,
    complete: complete,
    suspend: suspend,
    getSuspendData: getSuspendData,
    finish: finish,
    isConnected: function() { return initialized; }
  };
})();

// Initialize on load, finish on unload
window.addEventListener('load', function() { SCORM.init(); });
window.addEventListener('beforeunload', function() { SCORM.finish(); });
</script>
